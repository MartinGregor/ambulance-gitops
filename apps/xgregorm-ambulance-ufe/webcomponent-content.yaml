apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: xgregorm-ambulance-ufe-content
spec:
  microFrontend: xgregorm-ambulance-ufe
  element: xgregorm-ambulance-wl-app
  attributes:
    - name: base-path
      value: ./xgregorm-ambulance-wl/
    - name: api-base
      value: http://localhost:5000/api
    - name: ambulance-id
      value: bobulova
  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?<pfx>-ambulance-wl(/.*)?$"